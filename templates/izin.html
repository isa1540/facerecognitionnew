<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Data Izin</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-7xl mx-auto p-8">

    <h1 class="text-3xl font-bold mb-6">
        Data Pengajuan Izin
    </h1>
<div class="bg-white p-6 rounded shadow mb-6">
    <h2 class="text-xl font-bold mb-4">Ajukan Izin</h2>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
        <select id="employee_id" class="border p-2 rounded">
            <option value="">Pilih Karyawan</option>
        </select>

        <input id="alasan" class="border p-2 rounded" placeholder="Alasan izin">

        <input id="tanggal_mulai" type="date" class="border p-2 rounded">

        <input id="tanggal_selesai" type="date" class="border p-2 rounded">
    </div>

    <button onclick="submitLeave()"
        class="mt-4 bg-blue-600 text-white px-4 py-2 rounded">
        Kirim Pengajuan
    </button>
</div>
    <table class="w-full bg-white rounded shadow">

        <thead class="bg-blue-600 text-white">

        <tr>
            <th class="p-3">Nama</th>
            <th>Alasan</th>
            <th>Mulai</th>
            <th>Selesai</th>
            <th>Status</th>
            <th>Aksi</th>
        </tr>

        </thead>

        <tbody id="leaveTable">

        </tbody>

    </table>

</div>

<script>

loadLeave();

async function loadLeave(){

    const response = await fetch("/api/leave");

    const result = await response.json();

    console.log(result);

    let html="";

    result.data.forEach(item=>{

        html+=`
        <tr class="border-b">

            <td class="p-3">${item.nama}</td>

            <td>${item.alasan}</td>

            <td>${item.tanggal_mulai}</td>

            <td>${item.tanggal_selesai}</td>

            <td>${item.status}</td>

            <td>

                <button onclick="approve(${item.id})"
                class="bg-green-600 text-white px-3 py-1 rounded">

                Approve

                </button>

                <button onclick="reject(${item.id})"
                class="bg-red-600 text-white px-3 py-1 rounded">

                Reject

                </button>

            </td>

        </tr>
        `;

    });

    document.getElementById("leaveTable").innerHTML=html;

}

async function approve(id){

    await fetch(`/api/leave/${id}/approve`,{
        method:"PUT"
    });

    loadLeave();

}

async function reject(id){

    await fetch(`/api/leave/${id}/reject`,{
        method:"PUT"
    });

    loadLeave();

}

loadEmployeesForLeave();

async function loadEmployeesForLeave() {
    const response = await fetch("/api/karyawan");
    const result = await response.json();

    const select = document.getElementById("employee_id");
    select.innerHTML = `<option value="">Pilih Karyawan</option>`;

    result.data.forEach(emp => {
        select.innerHTML += `
            <option value="${emp.id}">
                ${emp.nama} - ${emp.kode}
            </option>
        `;
    });
}

async function submitLeave() {
    const payload = {
        employee_id: document.getElementById("employee_id").value,
        alasan: document.getElementById("alasan").value,
        tanggal_mulai: document.getElementById("tanggal_mulai").value,
        tanggal_selesai: document.getElementById("tanggal_selesai").value
    };

    const response = await fetch("/api/leave", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
    });

    const result = await response.json();

    alert(result.message || "Selesai");

    if (result.success) {
        document.getElementById("alasan").value = "";
        document.getElementById("tanggal_mulai").value = "";
        document.getElementById("tanggal_selesai").value = "";
        loadLeave();
    }
}
</script>

</body>
</html>
